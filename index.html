<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="panel-glow" aria-hidden="true"></div>

  <main class="instrument">

    <header class="instrument__header">
      <div class="instrument__brand">
        <svg class="instrument__brand-mark" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/>
          <line x1="12" y1="12" x2="12" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
        </svg>
        <span class="instrument__brand-text">STOPWATCH</span>
      </div>
      <div class="instrument__status" id="statusLabel" data-state="idle">
        <span class="instrument__status-dot"></span>
        <span class="instrument__status-text">STANDING BY</span>
      </div>
    </header>

    <section class="bezel-wrap">
      <svg class="bezel" viewBox="0 0 320 320" aria-hidden="true">
        <!-- tick marks -->
        <g id="tickMarks"></g>
        <!-- progress ring: fills as the current second elapses -->
        <circle class="bezel__track" cx="160" cy="160" r="142" />
        <circle class="bezel__progress" id="bezelProgress" cx="160" cy="160" r="142" />
      </svg>

      <div class="readout">
        <div class="readout__time" id="timeDisplay">
          <span class="readout__hours" id="hoursWrap"><span id="hours">00</span><span class="readout__colon">:</span></span><span id="minutes">00</span><span class="readout__colon">:</span><span id="seconds">00</span><span class="readout__ms">.<span id="centis">00</span></span>
        </div>
        <div class="readout__sub" id="lapDelta">— : —</div>
      </div>
    </section>

    <section class="controls" aria-label="Stopwatch controls">
      <button class="ctrl btn btn-primary" id="lapBtn" disabled>
        <span class="ctrl__label">LAP</span>
        <span><i class="fa-solid fa-circle-dot"></i></span>
        <!-- <span class="ctrl__key">L</span> -->
      </button>

      <button class="ctrl btn btn-success" id="startBtn">
        <span class="ctrl__label" id="startBtnLabel">START</span>
        <span> <i class="fa-solid fa-circle-play"></i></span>
        <!-- <span class="ctrl__key">SPACE</span> -->
      </button>

      <button class="ctrl btn btn-danger" id="resetBtn" disabled >
        <span class="ctrl__label">RESET</span>
        <span><i class="fa-solid fa-rotate"></i></span>
        <!-- <span class="ctrl__key">R</span> -->
      </button>
    </section>

    <section class="splits" aria-label="Lap times">
      <div class="splits__head">
        <span>LAP</span>
        <span>SPLIT</span>
        <span>TOTAL</span>
        <span class="splits__head-delta">Δ</span>
      </div>
      <ol class="splits__list" id="lapList">
        <li class="splits__empty" id="lapEmpty">No laps recorded yet — press lap while running to mark one.</li>
      </ol>
    </section>

    <footer class="instrument__footer">
      <span id="bestLap">Best lap: —</span>
      <span class="instrument__footer-divider">·</span>
      <span id="worstLap">Slowest lap: —</span>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
